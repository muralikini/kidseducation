<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Kids Education Manager</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f2f5; }
        .login-box { max-width: 420px; margin: 100px auto; padding: 50px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; }
        button { width: 100%; padding: 14px; background: #1e40af; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 8px 0; }
        .main { display: none; padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div class="login-box" id="loginScreen">
        <h1>📚 Kids Education Manager</h1>
        <h2>Login</h2>
        <input type="text" id="username" value="admin" placeholder="Username"><br><br>
        <input type="password" id="password" value="admin123" placeholder="Password"><br><br>
        <button onclick="login()">Login</button>
        <p id="errorMsg" style="color:red; margin-top:15px;"></p>
    </div>

    <!-- MAIN APP -->
    <div class="main" id="mainApp">
        <h1>Welcome to Kids Education Manager</h1>
        <button onclick="logout()">Logout</button>
        <button onclick="switchTab('kids')">Kids Profile</button>
        <div id="content" style="margin-top:20px;"></div>
    </div>

    <script>
        // ================== FIREBASE CONFIG ==================
        const firebaseConfig = {
          apiKey: "AIzaSyApHwBPmNIsuAJHfz7nM40t4cHL_u481P8",
          authDomain: "kids-education-manager.firebaseapp.com",
          projectId: "kids-education-manager",
          storageBucket: "kids-education-manager.firebasestorage.app",
          messagingSenderId: "473594316250",
          appId: "1:473594316250:web:17165d047e267abc6a6ce3"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = null;

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (username === "admin" && password === "admin123") {
                currentUser = { username: "admin", role: "admin" };
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                switchTab('kids');
            } else {
                document.getElementById('errorMsg').textContent = "Invalid credentials";
            }
        }

        function logout() {
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'block';
        }

        function switchTab(tab) {
            if (tab === 'kids') renderKids();
        }

        async function renderKids() {
            const { docs } = await db.collection('kids').get();
            let html = `<h2>Kids Profile</h2><button onclick="addKid()">+ Add New Kid</button>`;

            html += `<table><tr><th>Name</th><th>DOB</th><th>Class</th><th>School</th></tr>`;
            docs.forEach(doc => {
                const kid = doc.data();
                html += `<tr><td>${kid.name}</td><td>${kid.dob}</td><td>${kid.currentClass}</td><td>${kid.school}</td></tr>`;
            });
            html += `</table>`;

            document.getElementById('content').innerHTML = html;
        }

        async function addKid() {
            const name = prompt("Enter Kid's Full Name:");
            if (!name) return;

            const dob = prompt("Date of Birth (YYYY-MM-DD):", "2015-05-20");
            const currentClass = prompt("Current Class:", "5th Grade");
            const school = prompt("School Name:", "Demo School");

            await db.collection('kids').add({
                name: name,
                dob: dob,
                currentClass: currentClass,
                school: school,
                stream: "CBSE"
            });

            alert("Kid added successfully!");
            renderKids();
        }
    </script>
</body>
</html>
