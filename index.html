<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Family Vault</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { 
            --bg: #f8fafc; 
            --card: #ffffff; 
            --text: #1f2937; 
            --border: #e2e8f0; 
            --primary: #1e40af; 
        }
        body.dark { 
            --bg: #0f172a; 
            --card: #1e2937; 
            --text: #e2e8f0; 
            --border: #475569; 
            --primary: #3b82f6; 
        }
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
        }
        header { 
            background: var(--primary); 
            color: white; 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 15px; }

        .tabs { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 10px; }
        .tab { padding: 10px 20px; background: #e2e8f0; border: none; border-radius: 9999px; white-space: nowrap; font-weight: bold; }
        body.dark .tab { background: #334155; color: #cbd5e1; }
        .tab.active { background: var(--primary); color: white; }

        .content { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        /* Fixed Form Layout */
        .form-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 18px; 
        }
        @media (min-width: 768px) {
            .form-grid { grid-template-columns: 1fr 1fr; }
        }

        .form-group { margin-bottom: 18px; }
        .form-group label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: 600; 
        }
        .form-group input, .form-group select { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            font-size: 16px; 
            box-sizing: border-box;
        }

        .full-width { grid-column: 1 / -1; }

        .photo-section { margin: 20px 0; text-align: center; }
        .photo-preview { max-width: 100%; border-radius: 12px; margin: 10px 0; }

        .btn { 
            padding: 14px 24px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: #ef4444; color: white; }
    </style>
</head>
<body onload="loadDarkMode()">
<!-- LOGIN -->
    <div id="loginScreen" style="max-width: 420px; margin: 80px auto; padding: 40px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); text-align: center;">
        <h1>🔐 Family Vault</h1>
        <h2>Family Information Manager</h2>
        <input type="text" id="username" value="admin" placeholder="Username"><br><br>
        <input type="password" id="password" value="admin123" placeholder="Password"><br><br>
        <button onclick="login()" class="btn" style="background:var(--primary); color:white; width:100%; padding:14px;">Login</button>
        <p id="errorMsg" style="color:red; margin-top:10px;"></p>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" style="display:none;">
        <header>
            <div class="header-title">
                🔐 Family Vault
            </div>
            <div class="header-actions">
                <button onclick="toggleDarkMode()" class="btn btn-dark">🌙</button>
                <button onclick="logout()" class="btn btn-danger">Logout</button>
            </div>
        </header>

        <div class="container">
            <div class="tabs" id="tabs"></div>
            <div class="content" id="content"></div>
        </div>
    </div>

    <!-- DOCUMENT VIEWER MODAL -->
    <div id="docViewerModal" class="modal">
        <div class="modal-content">
            <h2 id="modalDocTitle"></h2>
            <div id="modalDocDetails"></div>
            <div id="modalPhotos" style="margin:20px 0;"></div>
            <button class="btn btn-danger" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        // ================== YOUR FIREBASE CONFIG ==================
        const firebaseConfig = {
          apiKey: "AIzaSyAJgTIZrQJTyqEI1YnAs2TEWZcPK45lGWM",
          authDomain: "family-vault-3c73e.firebaseapp.com",
          projectId: "family-vault-3c73e",
          storageBucket: "family-vault-3c73e.firebasestorage.app",
          messagingSenderId: "705062533139",
          appId: "1:705062533139:web:011cb0290a51b14ed867e6"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        let currentUser = null;
        let currentTab = 'dashboard';

        const modules = [
            { id: 'dashboard', name: 'Dashboard' },
            { id: 'family', name: 'Family Members' },
            { id: 'documents', name: 'Documents' },
            { id: 'admin', name: 'Admin Panel' }
        ];

        function toggleDarkMode() {
            document.body.classList.toggle('dark');
            localStorage.setItem('darkMode', document.body.classList.contains('dark'));
        }

        function loadDarkMode() {
            if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');
        }

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            const snap = await db.collection('users').where('username', '==', username).get();
            if (!snap.empty) {
                const userData = snap.docs[0].data();
                if (userData.password === password) {
                    currentUser = { id: snap.docs[0].id, ...userData };
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('mainApp').style.display = 'block';
                    renderTabs();
                    renderContent();
                    return;
                }
            }
            document.getElementById('errorMsg').textContent = "Invalid credentials";
        }

        function logout() {
            if (confirm("Logout?")) location.reload();
        }

        function renderTabs() {
            const div = document.getElementById('tabs');
            div.innerHTML = '';
            modules.forEach(m => {
                if (m.id === 'admin' && currentUser.role !== 'admin') return;
                const btn = document.createElement('button');
                btn.className = `tab ${m.id === currentTab ? 'active' : ''}`;
                btn.textContent = m.name;
                btn.onclick = () => { currentTab = m.id; renderTabs(); renderContent(); };
                div.appendChild(btn);
            });
        }

        function renderContent() {
            const content = document.getElementById('content');
            content.innerHTML = `<h2>${modules.find(m => m.id === currentTab).name}</h2>`;

            if (currentTab === 'dashboard') renderDashboard();
            else if (currentTab === 'family') renderFamily();
            else if (currentTab === 'documents') renderDocuments();
            else if (currentTab === 'admin') renderAdminPanel();
        }

        // ====================== DASHBOARD (FULLY FUNCTIONAL) ======================
        async function renderDashboard() {
            const content = document.getElementById('content');

            const familySnap = await db.collection('family').get();
            const docSnap = await db.collection('documents').get();

            let totalFamily = familySnap.docs.length;
            let totalDocs = docSnap.docs.length;

            content.innerHTML += `
                <h2>📊 Family Vault Overview</h2>
                
                <div class="dashboard-grid">
                    <div class="card">
                        <h3>👨‍👩‍👧‍👦 Family Members</h3>
                        <div class="value">${totalFamily}</div>
                    </div>
                    <div class="card">
                        <h3>📄 Total Documents</h3>
                        <div class="value">${totalDocs}</div>
                    </div>
                    <div class="card">
                        <h3>🔐 Secure Records</h3>
                        <div class="value">${totalFamily + totalDocs}</div>
                    </div>
                    <div class="card">
                        <h3>👤 Logged in as</h3>
                        <div class="value">${currentUser.username}</div>
                        <small>Role: ${currentUser.role}</small>
                    </div>
                </div>

                <h3>Recent Family Members</h3>
                <table id="recentFamilyTable">
                    <thead><tr><th>Name</th><th>Relation</th><th>Phone</th></tr></thead>
                    <tbody></tbody>
                </table>

                <h3>Recent Documents</h3>
                <table id="recentDocsTable">
                    <thead><tr><th>Type</th><th>Number</th><th>Issued To</th></tr></thead>
                    <tbody></tbody>
                </table>
            `;

            loadRecentFamily();
            loadRecentDocuments();
        }

        async function loadRecentFamily() {
            const { docs } = await db.collection('family').orderBy('updatedAt', 'desc').limit(5).get();
            const tbody = document.querySelector('#recentFamilyTable tbody');
            tbody.innerHTML = docs.length ? '' : '<tr><td colspan="3">No records yet</td></tr>';

            docs.forEach(doc => {
                const m = doc.data();
                const row = document.createElement('tr');
                row.innerHTML = `<td>${m.name}</td><td>${m.relation}</td><td>${m.phone || '-'}</td>`;
                tbody.appendChild(row);
            });
        }

        async function loadRecentDocuments() {
            const { docs } = await db.collection('documents').orderBy('updatedAt', 'desc').limit(5).get();
            const tbody = document.querySelector('#recentDocsTable tbody');
            tbody.innerHTML = docs.length ? '' : '<tr><td colspan="3">No documents yet</td></tr>';

            docs.forEach(doc => {
                const d = doc.data();
                const row = document.createElement('tr');
                row.innerHTML = `<td>${d.type}</td><td>${d.number || '-'}</td><td>${d.issuedTo || '-'}</td>`;
                tbody.appendChild(row);
            });
        }
        // ====================== DASHBOARD (FULLY FUNCTIONAL) ======================
        //function renderFamily() { document.getElementById('content').innerHTML += `<p>Family Members Module - Under Development</p>`; }
        //function renderDocuments() { document.getElementById('content').innerHTML += `<p>Documents Module - Under Development</p>`; }

        // ====================== ADMIN PANEL (FULLY FUNCTIONAL) ======================
        function renderAdminPanel() {
            const content = document.getElementById('content');
            content.innerHTML += `
                <button class="btn btn-primary" onclick="showUserForm()">+ Create New User</button>

                <div class="form-container" id="userForm">
                    <h3 id="userFormTitle">Create New User</h3>
                    <div class="form-group"><label>Username</label><input type="text" id="newUsername"></div>
                    <div class="form-group"><label>Password</label><input type="password" id="newPassword"></div>
                    <div class="form-group"><label>Role</label>
                        <select id="newRole">
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="form-buttons">
                        <button class="btn btn-primary" onclick="saveUser()">Save User</button>
                        <button class="btn btn-danger" onclick="hideUserForm()">Cancel</button>
                    </div>
                </div>

                <h3>All Users</h3>
                <table id="usersTable">
                    <thead><tr><th>Username</th><th>Role</th><th>Actions</th></tr></thead>
                    <tbody></tbody>
                </table>
            `;
            loadUsersTable();
        }

        function showUserForm(user = null) {
            document.getElementById('userForm').style.display = 'block';
            editingUserId = user ? user.id : null;
            document.getElementById('userFormTitle').textContent = user ? "Edit User" : "Create New User";

            if (user) {
                document.getElementById('newUsername').value = user.username;
                document.getElementById('newRole').value = user.role;
                document.getElementById('newPassword').value = '';
            } else {
                document.getElementById('newUsername').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('newRole').value = 'user';
            }
        }

        function hideUserForm() {
            document.getElementById('userForm').style.display = 'none';
        }

        async function saveUser() {
            const username = document.getElementById('newUsername').value.trim();
            const password = document.getElementById('newPassword').value.trim();
            const role = document.getElementById('newRole').value;

            if (!username) return alert("Username is required");
            if (!editingUserId && !password) return alert("Password is required for new user");

            const userData = { username, role };

            if (password) userData.password = password;

            try {
                if (editingUserId) {
                    await db.collection('users').doc(editingUserId).update(userData);
                } else {
                    await db.collection('users').add(userData);
                }
                alert("User saved successfully!");
                hideUserForm();
                loadUsersTable();
            } catch (e) {
                alert("Error saving user");
            }
        }

        async function loadUsersTable() {
            const { docs } = await db.collection('users').get();
            const tbody = document.querySelector('#usersTable tbody');
            tbody.innerHTML = '';

            docs.forEach(doc => {
                const user = doc.data();
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${user.username}</td>
                    <td>${user.role}</td>
                    <td>
                        <button class="btn btn-primary" onclick="editUser('${doc.id}')">Edit</button>
                        ${user.username !== 'admin' ? `<button class="btn btn-danger" onclick="deleteUser('${doc.id}')">Delete</button>` : ''}
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function editUser(id) {
            db.collection('users').doc(id).get().then(doc => {
                if (doc.exists) showUserForm({ id: doc.id, ...doc.data() });
            });
        }

        async function deleteUser(id) {
            if (confirm("Delete this user?")) {
                await db.collection('users').doc(id).delete();
                loadUsersTable();
            }
        }
        // ====================== ADMIN PANEL (FULLY FUNCTIONAL) ======================
        // Initialize Default Admin
        async function initDefaultAdmin() {
            const snap = await db.collection('users').where('username', '==', 'admin').get();
            if (snap.empty) {
                await db.collection('users').add({ username: 'admin', password: 'admin123', role: 'admin' });
            }
        }

        // ====================== FAMILY MEMBERS (FULLY FUNCTIONAL) ======================
        // ====================== FAMILY MEMBERS ======================
        function renderFamily() {
            const content = document.getElementById('content');
            content.innerHTML += `
                <button class="btn btn-primary" onclick="showFamilyForm()">+ Add Family Member</button>

                <div class="form-container" id="familyForm">
                    <h3 id="formTitle">Add Family Member</h3>
                    <div class="form-grid">
                        <div class="form-group"><label>Full Name</label><input type="text" id="fName"></div>
                        <div class="form-group"><label>Relation</label><select id="fRelation">
                            <option value="Self">Self</option><option value="Spouse">Spouse</option>
                            <option value="Father">Father</option><option value="Mother">Mother</option>
                            <option value="Son">Son</option><option value="Daughter">Daughter</option>
                        </select></div>
                        <div class="form-group"><label>DOB</label><input type="date" id="fDOB"></div>
                        <div class="form-group"><label>Phone</label><input type="text" id="fPhone"></div>
                        <div class="form-group"><label>Email</label><input type="email" id="fEmail"></div>
                        <div class="form-group full-width"><label>Address</label><input type="text" id="fAddress"></div>
                    </div>

                    <div class="photo-section">
                        <label>Upload Photo</label><br>
                        <input type="file" id="fPhoto" accept="image/*" onchange="previewPhoto(event)">
                        <div id="photoPreview"></div>
                    </div>

                    <div class="form-buttons">
                        <button class="btn btn-primary" onclick="saveFamilyMember()">Save Member</button>
                        <button class="btn btn-danger" onclick="hideFamilyForm()">Cancel</button>
                    </div>
                </div>

                <h3>Family Members</h3>
                <table id="familyTable">
                    <thead><tr><th>Photo</th><th>Name</th><th>Relation</th><th>DOB</th><th>Phone</th><th>Actions</th></tr></thead>
                    <tbody></tbody>
                </table>
            `;
            loadFamilyTable();
        }

        function previewPhoto(e) {
            const file = e.target.files[0];
            if (file) {
                currentPhotoFile = file;
                document.getElementById('photoPreview').innerHTML = `<img src="${URL.createObjectURL(file)}" class="photo-preview">`;
            }
        }

        function showFamilyForm(member = null) {
            document.getElementById('familyForm').style.display = 'block';
            editingMemberId = member ? member.id : null;
            document.getElementById('formTitle').textContent = member ? "Edit Family Member" : "Add Family Member";
            document.getElementById('photoPreview').innerHTML = '';
            currentPhotoFile = null;

            if (member) {
                document.getElementById('fName').value = member.name || '';
                document.getElementById('fRelation').value = member.relation || 'Self';
                document.getElementById('fDOB').value = member.dob || '';
                document.getElementById('fPhone').value = member.phone || '';
                document.getElementById('fEmail').value = member.email || '';
                document.getElementById('fAddress').value = member.address || '';
                if (member.photoURL) {
                    document.getElementById('photoPreview').innerHTML = `<img src="${member.photoURL}" class="photo-preview">`;
                }
            } else {
                document.getElementById('fName').value = '';
                document.getElementById('fRelation').value = 'Self';
                document.getElementById('fDOB').value = '';
                document.getElementById('fPhone').value = '';
                document.getElementById('fEmail').value = '';
                document.getElementById('fAddress').value = '';
            }
        }

        function hideFamilyForm() {
            document.getElementById('familyForm').style.display = 'none';
            editingMemberId = null;
        }

        async function saveFamilyMember() {
            const name = document.getElementById('fName').value.trim();
            if (!name) return alert("Full Name is required");

            let photoURL = '';

            try {
                if (currentPhotoFile) {
                    const fileName = Date.now() + '_' + currentPhotoFile.name;
                    const storageRef = storage.ref('family-photos/' + fileName);
                    const snapshot = await storageRef.put(currentPhotoFile);
                    photoURL = await snapshot.ref.getDownloadURL();
                }

                const memberData = {
                    name: name,
                    relation: document.getElementById('fRelation').value,
                    dob: document.getElementById('fDOB').value,
                    phone: document.getElementById('fPhone').value,
                    email: document.getElementById('fEmail').value,
                    address: document.getElementById('fAddress').value,
                    photoURL: photoURL || (editingMemberId ? undefined : ''),
                    updatedAt: new Date().toISOString()
                };

                if (editingMemberId) {
                    await db.collection('family').doc(editingMemberId).update(memberData);
                    console.log("Updated existing record");
                } else {
                    await db.collection('family').add(memberData);
                    console.log("Added new record");
                }

                alert("✅ Saved successfully!");
                hideFamilyForm();
                loadFamilyTable();

            } catch (error) {
                console.error(error);
                alert("❌ Error: " + error.message);
            }
        }

        async function loadFamilyTable() {
            const { docs } = await db.collection('family').get();
            const tbody = document.querySelector('#familyTable tbody');
            tbody.innerHTML = '';

            docs.forEach(doc => {
                const m = doc.data();
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${m.photoURL ? `<img src="${m.photoURL}" class="photo-preview" style="max-width:80px;">` : 'No Photo'}</td>
                    <td>${m.name}</td>
                    <td>${m.relation}</td>
                    <td>${m.dob || '-'}</td>
                    <td>${m.phone || '-'}</td>
                    <td>
                        <button class="btn btn-primary" onclick="editFamilyMember('${doc.id}')">Edit</button>
                        <button class="btn btn-danger" onclick="deleteFamilyMember('${doc.id}')">Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function editFamilyMember(id) {
            db.collection('family').doc(id).get().then(doc => {
                if (doc.exists) {
                    showFamilyForm({ id: doc.id, ...doc.data() });
                }
            }).catch(err => console.error(err));
        }

        async function deleteFamilyMember(id) {
            if (confirm("Delete this family member?")) {
                await db.collection('family').doc(id).delete();
                loadFamilyTable();
            }
        }
        // ====================== FAMILY MEMBERS (FULLY FUNCTIONAL) ======================

        // ====================== DOCUMENTS MODULE ======================
        // ====================== DOCUMENTS (FULLY FUNCTIONAL with Edit + Download) ======================
        function renderDocuments() {
            const content = document.getElementById('content');
            content.innerHTML += `
                <button class="btn btn-primary" onclick="showDocumentForm()">+ Add New Document</button>

                <div class="form-container" id="documentForm">
                    <h3 id="docFormTitle">Add Document</h3>
                    <div class="form-grid">
                        <div class="form-group"><label>Document Type</label>
                            <select id="docType" onchange="toggleCustomType()">
                                <option value="Aadhar Card">Aadhar Card</option>
                                <option value="PAN Card">PAN Card</option>
                                <option value="Passport">Passport</option>
                                <option value="Voter ID">Voter ID</option>
                                <option value="Driving License">Driving License</option>
                                <option value="10th Certificate">10th Certificate</option>
                                <option value="Degree Certificate">Degree Certificate</option>
                                <option value="Custom">Custom</option>
                            </select>
                        </div>
                        <div class="form-group" id="customTypeGroup" style="display:none;">
                            <label>Custom Type</label><input type="text" id="customType">
                        </div>
                        <div class="form-group"><label>Document Number</label><input type="text" id="docNumber"></div>
                        <div class="form-group"><label>Expiry Date</label><input type="date" id="docExpiry"></div>
                        <div class="form-group full-width"><label>Issued To</label><input type="text" id="docIssuedTo"></div>
                    </div>

                    <div class="photo-section">
                        <label>Front Side Photo</label><br>
                        <input type="file" id="docFront" accept="image/*">
                    </div>
                    <div class="photo-section">
                        <label>Back Side Photo (Optional)</label><br>
                        <input type="file" id="docBack" accept="image/*">
                    </div>

                    <div class="form-buttons">
                        <button class="btn btn-primary" onclick="saveDocument()">Save Document</button>
                        <button class="btn btn-danger" onclick="hideDocumentForm()">Cancel</button>
                    </div>
                </div>

                <h3>All Documents</h3>
                <table id="documentsTable">
                    <thead><tr><th>Type</th><th>Number</th><th>Expiry</th><th>Issued To</th><th>Actions</th></tr></thead>
                    <tbody></tbody>
                </table>
            `;
            loadDocumentsTable();
        }

        function toggleCustomType() {
            const isCustom = document.getElementById('docType').value === 'Custom';
            document.getElementById('customTypeGroup').style.display = isCustom ? 'block' : 'none';
        }

        function showDocumentForm(doc = null) {
            document.getElementById('documentForm').style.display = 'block';
            editingDocId = doc ? doc.id : null;
            document.getElementById('docFormTitle').textContent = doc ? "Edit Document" : "Add New Document";

            if (doc) {
                document.getElementById('docType').value = doc.type.includes('Custom') ? 'Custom' : doc.type;
                document.getElementById('customType').value = doc.type.includes('Custom') ? doc.type : '';
                document.getElementById('docNumber').value = doc.number || '';
                document.getElementById('docExpiry').value = doc.expiry || '';
                document.getElementById('docIssuedTo').value = doc.issuedTo || '';
            }
        }

        function hideDocumentForm() {
            document.getElementById('documentForm').style.display = 'none';
            editingDocId = null;
        }

        async function saveDocument() {
            let type = document.getElementById('docType').value;
            if (type === 'Custom') type = document.getElementById('customType').value || 'Custom';

            let frontURL = '', backURL = '';

            try {
                const frontFile = document.getElementById('docFront').files[0];
                if (frontFile) {
                    const ref = storage.ref('documents/' + Date.now() + '_front_' + frontFile.name);
                    await ref.put(frontFile);
                    frontURL = await ref.getDownloadURL();
                }

                const backFile = document.getElementById('docBack').files[0];
                if (backFile) {
                    const ref = storage.ref('documents/' + Date.now() + '_back_' + backFile.name);
                    await ref.put(backFile);
                    backURL = await ref.getDownloadURL();
                }

                const docData = {
                    type: type,
                    number: document.getElementById('docNumber').value,
                    expiry: document.getElementById('docExpiry').value,
                    issuedTo: document.getElementById('docIssuedTo').value,
                    frontURL: frontURL,
                    backURL: backURL,
                    updatedAt: new Date().toISOString()
                };

                if (editingDocId) {
                    await db.collection('documents').doc(editingDocId).update(docData);
                } else {
                    await db.collection('documents').add(docData);
                }

                alert("✅ Document saved successfully!");
                hideDocumentForm();
                loadDocumentsTable();

            } catch (e) {
                console.error(e);
                alert("Error saving document. Please try again.");
            }
        }

        async function loadDocumentsTable() {
            const { docs } = await db.collection('documents').get();
            const tbody = document.querySelector('#documentsTable tbody');
            tbody.innerHTML = '';

            docs.forEach(doc => {
                const d = doc.data();
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${d.type}</td>
                    <td>${d.number || '-'}</td>
                    <td>${d.expiry || '-'}</td>
                    <td>${d.issuedTo || '-'}</td>
                    <td>
                        <button class="btn btn-info" onclick="viewDocument('${doc.id}')">View</button>
                        <button class="btn btn-primary" onclick="editDocument('${doc.id}')">Edit</button>
                        <button class="btn btn-danger" onclick="deleteDocument('${doc.id}')">Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        async function viewDocument(id) {
            const docSnap = await db.collection('documents').doc(id).get();
            if (!docSnap.exists) return;

            const d = docSnap.data();
            const modal = document.getElementById('docViewerModal');

            document.getElementById('modalDocTitle').textContent = d.type;

            let details = `
                <p><strong>Number:</strong> ${d.number || 'N/A'}</p>
                <p><strong>Expiry:</strong> ${d.expiry || 'N/A'}</p>
                <p><strong>Issued To:</strong> ${d.issuedTo || 'N/A'}</p>
                <hr>
            `;

            let photosHTML = `<h3>Photos</h3>`;

            if (d.frontURL) {
                photosHTML += `<p><strong>Front Side:</strong> <a href="${d.frontURL}" target="_blank" download>📥 Download Front</a></p>`;
                photosHTML += `<img src="${d.frontURL}" style="max-width:100%; border-radius:8px; margin:10px 0;">`;
            }
            if (d.backURL) {
                photosHTML += `<p><strong>Back Side:</strong> <a href="${d.backURL}" target="_blank" download>📥 Download Back</a></p>`;
                photosHTML += `<img src="${d.backURL}" style="max-width:100%; border-radius:8px; margin:10px 0;">`;
            }

            document.getElementById('modalDocDetails').innerHTML = details + photosHTML;
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('docViewerModal').style.display = 'none';
        }

        function editDocument(id) {
            db.collection('documents').doc(id).get().then(doc => {
                if (doc.exists) showDocumentForm({ id: doc.id, ...doc.data() });
            });
        }

        async function deleteDocument(id) {
            if (confirm("Delete this document?")) {
                await db.collection('documents').doc(id).delete();
                loadDocumentsTable();
            }
        }
        // ====================== DOCUMENTS MODULE ======================
        

        initDefaultAdmin();
        renderTabs();
        renderContent();
    </script>
</body>
</html>
