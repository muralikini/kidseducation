<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Kids Education Manager</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #1f2937; }
        body.dark { --bg: #0f172a; --card: #1e2937; --text: #e2e8f0; }
        body { font-family: Arial, sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        header { background: #1e40af; color: white; padding: 15px; text-align: center; }
        .container { max-width: 1400px; margin: 20px auto; padding: 20px; }
        .tabs button { padding: 12px 20px; margin: 5px; border: none; border-radius: 6px; cursor: pointer; }
        .tab.active { background: #1e40af; color: white; }
        .content { padding: 20px; background: var(--card); border-radius: 8px; }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
        <div style="max-width: 420px; margin: 120px auto; padding: 50px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); text-align: center;">
            <h1>📚 Kids Education Manager</h1>
            <h2>Login</h2>
            <input type="text" id="username" placeholder="Username" value="admin" style="width:100%; padding:12px; margin:10px 0; font-size:16px;"><br>
            <input type="password" id="password" placeholder="Password" value="admin123" style="width:100%; padding:12px; margin:10px 0; font-size:16px;"><br><br>
            <button onclick="login()" style="padding:14px 40px; background:#1e40af; color:white; border:none; border-radius:6px; cursor:pointer; font-size:16px;">Login</button>
            <p id="errorMsg" style="color:red; margin-top:15px;"></p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" style="display:none;">
        <header>
            <h1>📚 Kids Education Manager</h1>
            <button onclick="logout()" style="position:absolute; top:15px; right:20px; padding:8px 16px; background:#ef4444; color:white; border:none; border-radius:5px;">Logout</button>
        </header>

        <div class="container">
            <div class="tabs" id="tabs"></div>
            <div class="content" id="content"></div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentTab = 'dashboard';

        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (username === "admin" && password === "admin123") {
                currentUser = { username: "admin", role: "admin" };
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                renderTabs();
                renderContent();
            } else {
                document.getElementById('errorMsg').textContent = "Invalid username or password";
            }
        }

        function logout() {
            if (confirm("Logout?")) {
                currentUser = null;
                document.getElementById('mainApp').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'block';
            }
        }

        function renderTabs() {
            const tabsDiv = document.getElementById('tabs');
            tabsDiv.innerHTML = `
                <button class="tab active" onclick="switchTab('dashboard')">Dashboard</button>
                <button class="tab" onclick="switchTab('kids')">Kids Profile</button>
            `;
        }

        function switchTab(tab) {
            currentTab = tab;
            renderTabs();
            renderContent();
        }

        function renderContent() {
            const content = document.getElementById('content');
            content.innerHTML = `<h2>${currentTab === 'dashboard' ? 'Dashboard' : 'Kids Profile'}</h2>`;
            
            if (currentTab === 'dashboard') {
                content.innerHTML += `<p>Welcome! Shared data system is ready.</p>`;
            } else {
                content.innerHTML += `<p>Kids Profile Module - Coming Soon</p>`;
            }
        }

        // Initialize
        renderContent();
    </script>
</body>
</html>
