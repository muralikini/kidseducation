<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Kids Education Manager</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f0f2f5; }
        .login-box { max-width: 400px; margin: 100px auto; padding: 40px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #1e40af; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>📚 Kids Education Manager</h1>
        <h2>Login</h2>
        <input type="text" id="username" value="admin" placeholder="Username"><br>
        <input type="password" id="password" value="admin123" placeholder="Password"><br><br>
        <button onclick="login()">Login</button>
        <p id="error" style="color:red; margin-top:10px;"></p>
    </div>

    <script>
        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (username === "admin" && password === "admin123") {
                alert("✅ Login Successful!\n\nWelcome to Kids Education Manager");
                // You can expand this later
            } else {
                document.getElementById('error').textContent = "❌ Invalid username or password";
            }
        }
    </script>
</body>
</html>
