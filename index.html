<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Kids Education Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #1f2937; }
        body.dark { --bg: #0f172a; --card: #1e2937; --text: #e2e8f0; }
        body { font-family: Arial, sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        header { background: #1e40af; color: white; padding: 15px; text-align: center; }
        .login-box { max-width: 420px; margin: 100px auto; padding: 50px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); text-align: center; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #1e40af; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        .main { display: none; padding: 20px; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div class="login-box" id="loginScreen">
        <h1>📚 Kids Education Manager</h1>
        <h2>Login</h2>
        <input type="text" id="username" value="admin" placeholder="Username"><br>
        <input type="password" id="password" value="admin123" placeholder="Password"><br><br>
        <button onclick="login()">Login</button>
        <p id="errorMsg" style="color:red; margin-top:15px;"></p>
    </div>

    <!-- MAIN APP -->
    <div class="main" id="mainApp">
        <header><h1>📚 Kids Education Manager</h1></header>
        <div style="padding:20px;">
            <h2>Welcome, Admin</h2>
            <p>✅ Connected to Shared Database</p>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        // ================== SUPABASE CONFIG ==================
        const SUPABASE_URL = 'https://dbitafgrdlzwhyoqofwq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_aU-605gJnM8-MGtqKNlEtQ_fOG_ZsOB';

        let supabaseClient = null;

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (username === "admin" && password === "admin123") {
                try {
                    supabaseClient = Supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    console.log("Supabase connected successfully");
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('mainApp').style.display = 'block';
                } catch(e) {
                    alert("Login successful, but database connection failed.");
                }
            } else {
                document.getElementById('errorMsg').textContent = "Invalid username or password";
            }
        }

        function logout() {
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'block';
        }
    </script>
</body>
</html>
