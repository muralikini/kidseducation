<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Kids Education Manager</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f2f5; }
        .login-box { max-width: 420px; margin: 100px auto; padding: 50px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); text-align: center; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #1e40af; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        .main { display: none; padding: 30px; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div class="login-box" id="loginScreen">
        <h1>📚 Kids Education Manager</h1>
        <h2>Login</h2>
        <input type="text" id="username" value="admin" placeholder="Username"><br>
        <input type="password" id="password" value="admin123" placeholder="Password"><br><br>
        <button onclick="login()">Login</button>
        <p id="errorMsg" style="color:red; margin-top:15px;"></p>
    </div>

    <!-- MAIN APP -->
    <div class="main" id="mainApp">
        <h1>Welcome to Kids Education Manager</h1>
        <p id="status">Connecting to database...</p>
        <button onclick="logout()">Logout</button>
    </div>

    <script>
        let supabaseClient = null;

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (username === "admin" && password === "admin123") {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';

                // Load Supabase after login
                await loadSupabase();
            } else {
                document.getElementById('errorMsg').textContent = "Invalid username or password";
            }
        }

        async function loadSupabase() {
            const statusEl = document.getElementById('status');
            try {
                const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
                
                const SUPABASE_URL = 'https://dbitafgrdlzwhyoqofwq.supabase.co';
                const SUPABASE_ANON_KEY = 'sb_publishable_aU-605gJnM8-MGtqKNlEtQ_fOG_ZsOB';

                supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                statusEl.innerHTML = "✅ Connected to Shared Database";
                statusEl.style.color = "green";
            } catch(e) {
                console.error(e);
                statusEl.innerHTML = "❌ Database connection failed";
                statusEl.style.color = "red";
            }
        }

        function logout() {
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'block';
        }
    </script>
</body>
</html>
